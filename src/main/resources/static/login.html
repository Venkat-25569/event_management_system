 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        .login-icon {
            font-size: 60px;
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .form-label {
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-icon">
            <i class="fas fa-calendar-check"></i>
        </div>
        <h2>Event Management</h2>
        <p class="text-center text-muted mb-4">Sign in to your account</p>
        
        <div id="alertContainer"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input type="email" class="form-control" id="email" 
                       placeholder="Enter your email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" class="form-control" id="password" 
                       placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3" id="loginButton">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div class="text-center">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
            <a href="index.html" class="text-muted">Back to Home</a>
        </div>
        
        <div class="mt-4 p-3 bg-light rounded">
            <h6 class="text-muted">Demo Accounts:</h6>
            <p class="mb-1 small"><i class="fas fa-user-shield"></i> <strong>admin@college.edu</strong> / admin123</p>
            <p class="mb-1 small"><i class="fas fa-user-graduate"></i> <strong>student1@college.edu</strong> / student123</p>
            <p class="mb-1 small"><i class="fas fa-user-tie"></i> <strong>coordinator@college.com</strong> / coordinator123</p>
            <p class="mb-0 small"><i class="fas fa-chalkboard-teacher"></i> <strong>hod@college.com</strong> / hod123</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
