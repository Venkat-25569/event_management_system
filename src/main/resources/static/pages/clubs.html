 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubs Management</title>
    
    <!-- Auth Check -->
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('⚠️ Please login to access this page');
                window.location.href = '../login.html';
            }
        })();
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-primary sidebar">
                <div class="position-sticky pt-3">
                    <h4 class="text-white text-center mb-4">
                        <i class="fas fa-calendar-alt"></i> Event Management
                    </h4>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="dashboard.html">
                                <i class="fas fa-home"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="events.html">
                                <i class="fas fa-calendar"></i> Events
                            </a>
                        </li>
                        <li class="nav-item" id="myEventsLink" style="display: none;">
                            <a class="nav-link text-white" href="my-events.html">
                                <i class="fas fa-star"></i> My Events
                            </a>
                        </li>
                        <li class="nav-item" id="paymentsLink" style="display: none;">
                            <a class="nav-link text-white" href="payments.html">
                                <i class="fas fa-credit-card"></i> Payments
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white active" href="clubs.html">
                                <i class="fas fa-users"></i> Clubs
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="calendar.html">
                                <i class="fas fa-calendar-alt"></i> Calendar
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="attendance.html">
                                <i class="fas fa-user-check"></i> Attendance
                            </a>
                        </li>
                        <li class="nav-item" id="reportsLink">
                            <a class="nav-link text-white" href="reports.html">
                                <i class="fas fa-chart-bar"></i> Reports
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4" style="background-color: #f8f9fa; min-height: 100vh;">
                <!-- Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <div>
                        <h1 class="h2">Clubs Management</h1>
                        <p class="text-muted">View and manage college clubs</p>
                    </div>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="navbar-text text-dark me-3">
                            <i class="fas fa-user"></i> Loading...
                        </span>
                    </div>
                </div>

                <!-- Create Club Button - ADMIN ONLY -->
                <div class="mb-3" id="createClubSection" style="display: none;">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#clubModal" onclick="openCreateModal()">
                        <i class="fas fa-plus"></i> Create Club
                    </button>
                </div>

                <!-- Clubs Grid -->
                <div class="row" id="clubsContainer">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create/Edit Club Modal - ADMIN ONLY -->
    <div class="modal fade" id="clubModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Create Club</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="clubForm">
                        <input type="hidden" id="clubId">
                        
                        <div class="mb-3">
                            <label class="form-label">Club Name *</label>
                            <input type="text" class="form-control" id="clubName" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Advisor Name</label>
                            <input type="text" class="form-control" id="advisorName">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Contact Email</label>
                            <input type="email" class="form-control" id="contactEmail">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveClub()">
                        <i class="fas fa-save"></i> Save Club
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/clubs.js"></script>
</body>
</html>
