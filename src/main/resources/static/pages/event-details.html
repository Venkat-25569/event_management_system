  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .event-card {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .event-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .event-body {
            padding: 30px;
        }
        .event-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .info-row {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-icon {
            font-size: 24px;
            width: 50px;
            text-align: center;
            color: #667eea;
        }
        .info-content {
            flex: 1;
        }
        .info-label {
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }
        .info-value {
            color: #333;
            font-size: 16px;
            margin-top: 5px;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="event-card">
        <div class="event-header">
            <div class="event-icon">
                <i class="fas fa-calendar-alt"></i>
            </div>
            <h2 id="eventTitle">Loading Event...</h2>
        </div>
        
        <div class="event-body" id="eventDetails">
            <div class="loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading event details...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        
        // Get event ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        
        console.log('Event ID from QR code:', eventId);
        
        if (!eventId) {
            document.getElementById('eventDetails').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle"></i>
                    <strong>Error</strong><br>
                    No event ID provided in QR code.
                </div>
            `;
        } else {
            loadEventDetails(eventId);
        }
        
        async function loadEventDetails(eventId) {
            try {
                console.log('Fetching event details for ID:', eventId);
                
                const response = await fetch(`${API_URL}/events/${eventId}`);
                
                if (!response.ok) {
                    throw new Error('Event not found');
                }
                
                const event = await response.json();
                console.log('Event loaded:', event);
                
                // Update title
                document.getElementById('eventTitle').textContent = event.title;
                
                // Update details
                document.getElementById('eventDetails').innerHTML = `
                    <div class="info-row">
                        <div class="info-icon">
                            <i class="fas fa-calendar"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Event Date</div>
                            <div class="info-value">${formatDate(event.eventDate)}</div>
                        </div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Venue</div>
                            <div class="info-value">${event.venue || 'To Be Announced'}</div>
                        </div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Organized by</div>
                            <div class="info-value">${event.clubName || 'N/A'}</div>
                        </div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Organizer</div>
                            <div class="info-value">${event.organizerName || 'N/A'}</div>
                        </div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-icon">
                            <i class="fas fa-user-friends"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Expected Participants</div>
                            <div class="info-value">${event.participantCount || 0} students</div>
                        </div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-icon">
                            <i class="fas fa-info-circle"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Status</div>
                            <div class="info-value">
                                <span class="status-badge bg-${getStatusColor(event.status)} text-white">
                                    ${event.status}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    ${event.description ? `
                        <div class="info-row">
                            <div class="info-icon">
                                <i class="fas fa-align-left"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">Description</div>
                                <div class="info-value">${event.description}</div>
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="text-center mt-4">
                        <a href="../login.html" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Login to Register
                        </a>
                    </div>
                    
                    <div class="text-center mt-3">
                        <p class="text-muted small">
                            <i class="fas fa-qrcode"></i> Scanned from QR Code
                        </p>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading event:', error);
                document.getElementById('eventTitle').textContent = 'Error';
                document.getElementById('eventDetails').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i>
                        <strong>Error loading event details</strong>
                        <p class="mb-0">${error.message}</p>
                    </div>
                `;
            }
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'To Be Announced';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        function getStatusColor(status) {
            const colors = {
                'APPROVED': 'success',
                'PENDING': 'warning',
                'REJECTED': 'danger',
                'COMPLETED': 'info'
            };
            return colors[status] || 'secondary';
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
