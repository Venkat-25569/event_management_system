 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .attendance-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        #video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }
        #canvas {
            display: none;
        }
        .captured-photo {
            max-width: 100%;
            border-radius: 10px;
            border: 3px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="attendance-card p-4">
            <div class="text-center mb-4">
                <h2 class="text-primary">
                    <i class="fas fa-user-check"></i> Mark Your Attendance
                </h2>
                <p class="text-muted">Event ID: <strong id="eventIdDisplay"></strong></p>
            </div>

            <!-- Photo Section -->
            <div id="photoSection">
                <div class="mb-3 text-center">
                    <video id="video" autoplay></video>
                    <canvas id="canvas"></canvas>
                    <div id="capturedPhotoDiv" style="display: none;">
                        <img id="capturedPhoto" class="captured-photo">
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button class="btn btn-primary" id="startCameraBtn" onclick="startCamera()">
                        <i class="fas fa-camera"></i> Start Camera
                    </button>
                    <button class="btn btn-success" id="captureBtn" onclick="capturePhoto()" style="display: none;">
                        <i class="fas fa-camera"></i> Capture Photo
                    </button>
                    <button class="btn btn-warning" id="retakeBtn" onclick="retakePhoto()" style="display: none;">
                        <i class="fas fa-redo"></i> Retake Photo
                    </button>
                </div>
            </div>

            <!-- Form Section -->
            <div id="formSection" style="display: none;">
                <hr>
                <h5 class="text-center mb-3">Enter Your Details</h5>
                <form id="attendanceForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="text" class="form-control" id="rollNumber">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" class="form-control" id="department">
                    </div>
                    <button type="button" class="btn btn-success w-100" id="submitBtn" onclick="markAttendance()">
                        <i class="fas fa-check"></i> Submit Attendance
                    </button>
                </form>
            </div>

            <!-- Success Section -->
            <div id="successSection" style="display: none;">
                <div class="text-center py-5">
                    <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
                    <div id="successMessage" class="mt-4"></div>
                    <button class="btn btn-primary mt-3" onclick="window.close()">
                        <i class="fas fa-times"></i> Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        let videoStream = null;
        let photoBlob = null;

        document.getElementById('eventIdDisplay').textContent = eventId || 'Unknown';

        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = videoStream;
                
                document.getElementById('startCameraBtn').style.display = 'none';
                document.getElementById('captureBtn').style.display = 'block';
                
            } catch (error) {
                console.error('Camera error:', error);
                alert('Unable to access camera. Please check permissions.');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            canvas.toBlob(function(blob) {
                photoBlob = blob;
                
                const img = document.getElementById('capturedPhoto');
                img.src = URL.createObjectURL(blob);
                
                document.getElementById('video').style.display = 'none';
                document.getElementById('capturedPhotoDiv').style.display = 'block';
                document.getElementById('captureBtn').style.display = 'none';
                document.getElementById('retakeBtn').style.display = 'block';
                document.getElementById('formSection').style.display = 'block';
                
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                }
            }, 'image/jpeg', 0.8);
        }

        function retakePhoto() {
            document.getElementById('video').style.display = 'block';
            document.getElementById('capturedPhotoDiv').style.display = 'none';
            document.getElementById('retakeBtn').style.display = 'none';
            document.getElementById('formSection').style.display = 'none';
            photoBlob = null;
            startCamera();
        }

        async function markAttendance() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const rollNumber = document.getElementById('rollNumber').value.trim();
            const department = document.getElementById('department').value.trim();
            
            if (!name || !email) {
                alert('Please fill all required fields');
                return;
            }
            
            if (!photoBlob) {
                alert('Please capture your photo first');
                return;
            }
            
            try {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Marking Attendance...';
                
                const formData = new FormData();
                formData.append('photo', photoBlob, 'attendance.jpg');
                formData.append('eventId', eventId);
                formData.append('studentName', name);
                formData.append('studentEmail', email);
                formData.append('rollNumber', rollNumber);
                formData.append('department', department);
                
                const response = await fetch('http://localhost:8080/api/attendance/mark-with-photo', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    document.getElementById('photoSection').style.display = 'none';
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('successSection').style.display = 'block';
                    
                    document.getElementById('successMessage').innerHTML = `
                        <div class="alert alert-success">
                            <h4><i class="fas fa-check-circle"></i> Attendance Marked Successfully!</h4>
                            <hr>
                            <p><strong>Event:</strong> ${data.eventTitle || 'Event #' + eventId}</p>
                            <p><strong>Name:</strong> ${name}</p>
                            <p><strong>Email:</strong> ${email}</p>
                            <p><strong>Check-in Time:</strong> ${new Date(data.checkInTime).toLocaleString()}</p>
                            <hr>
                            <p class="mb-0"><i class="fas fa-info-circle"></i> Your attendance has been successfully recorded. You can now close this page.</p>
                        </div>
                    `;
                    
                } else {
                    alert(data.message || 'Failed to mark attendance');
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-check"></i> Submit Attendance';
                }
                
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to mark attendance. Please try again.');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerHTML = '<i class="fas fa-check"></i> Submit Attendance';
            }
        }
    </script>
</body>
</html>
