  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Event Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-container {
            text-align: center;
            color: white;
        }
        .spinner-border {
            width: 4rem;
            height: 4rem;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner-border text-light mb-4" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h3>Loading Dashboard...</h3>
        <p class="text-light">Redirecting based on your role...</p>
    </div>

    <script>
        (function() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const fullName = localStorage.getItem('fullName');
            
            console.log('Dashboard Router - Token:', token ? 'Present' : 'Missing');
            console.log('Dashboard Router - Role:', role);
            console.log('Dashboard Router - User:', fullName);
            
            if (!token || !role) {
                console.error('No token or role - redirecting to login');
                alert('⚠️ Please login to access the dashboard');
                window.location.href = '../login.html';
                return;
            }
            
            setTimeout(() => {
                switch(role) {
                    case 'ADMIN':
                        console.log('Routing to: Admin Dashboard (events.html)');
                        window.location.href = 'events.html';
                        break;
                        
                    case 'HOD':
                        console.log('Routing to: HOD Dashboard');
                        window.location.href = 'hod-dashboard.html';
                        break;
                        
                    case 'EVENT_COORDINATOR':
                        console.log('Routing to: Event Coordinator Dashboard');
                        window.location.href = 'coordinator-dashboard.html';
                        break;
                        
                    case 'STUDENT':
                        console.log('Routing to: Student Dashboard (events.html)');
                        window.location.href = 'events.html';
                        break;
                        
                    default:
                        console.error('Unknown role:', role);
                        alert('⚠️ Unknown user role. Please contact administrator.');
                        localStorage.clear();
                        window.location.href = '../login.html';
                }
            }, 1000);
            
        })();
    </script>
</body>
</html>
