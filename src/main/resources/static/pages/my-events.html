 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - Student Dashboard</title>
    
    <!-- Auth Check -->
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('⚠️ Please login to access this page');
                window.location.href = '../login.html';
            }
        })();
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    
    <style>
        .event-card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .event-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
        }
        .event-body {
            padding: 20px;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-primary sidebar">
                <div class="position-sticky pt-3">
                    <h4 class="text-white text-center mb-4">
                        <i class="fas fa-graduation-cap"></i> Student Portal
                    </h4>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="dashboard.html">
                                <i class="fas fa-home"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="events.html">
                                <i class="fas fa-calendar"></i> Browse Events
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white active" href="my-events.html">
                                <i class="fas fa-star"></i> My Events
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="../student-rubrics.html">
                                <i class="fas fa-chart-bar"></i> My Scores
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="attendance.html">
                                <i class="fas fa-user-check"></i> My Attendance
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4" style="background-color: #f8f9fa; min-height: 100vh;">
                <!-- Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <div>
                        <h1 class="h2">My Registered Events</h1>
                        <p class="text-muted">View and manage your event registrations</p>
                    </div>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="navbar-text text-dark me-3">
                            <i class="fas fa-user"></i> <span id="userName">Student</span>
                        </span>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-primary" id="totalEvents">0</h3>
                                <p class="mb-0">Total Registrations</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-success" id="attendedEvents">0</h3>
                                <p class="mb-0">Attended Events</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-warning" id="upcomingEvents">0</h3>
                                <p class="mb-0">Upcoming Events</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-info" id="totalCredits">0</h3>
                                <p class="mb-0">EE Credits Earned</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Events List -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Registered Events</h5>
                    </div>
                    <div class="card-body">
                        <div id="myEventsList">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const API_URL = 'http://localhost:8080/api';
        let studentEmail = '';
        
        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎓 Student My Events page loaded');
            
            // Get user info from token
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const userName = payload.sub || payload.email || 'Student';
                    studentEmail = payload.sub || payload.email;
                    
                    document.getElementById('userName').textContent = userName;
                    console.log('👤 Student:', userName);
                    
                } catch (error) {
                    console.error('❌ Error parsing token:', error);
                }
            }
            
            // Load student's registered events
            loadMyEvents();
        });
        
        // ============================================
        // LOAD MY EVENTS
        // ============================================
        async function loadMyEvents() {
            try {
                console.log('📡 Loading registered events for:', studentEmail);
                
                const token = localStorage.getItem('token');
                
                // Fetch student's event registrations
                const response = await fetch(`${API_URL}/registrations/student/${encodeURIComponent(studentEmail)}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const registrations = await response.json();
                console.log('✅ Registrations loaded:', registrations.length);
                
                displayMyEvents(registrations);
                updateStats(registrations);
                
            } catch (error) {
                console.error('❌ Error loading events:', error);
                document.getElementById('myEventsList').innerHTML = `
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle"></i> Failed to load your events. 
                        <br><small>You may not have registered for any events yet.</small>
                    </div>
                `;
            }
        }
        
        // ============================================
        // DISPLAY MY EVENTS
        // ============================================
        function displayMyEvents(registrations) {
            const container = document.getElementById('myEventsList');
            
            if (!registrations || registrations.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center">
                        <i class="fas fa-info-circle"></i> You haven't registered for any events yet.
                        <br>
                        <a href="events.html" class="btn btn-primary mt-3">
                            <i class="fas fa-calendar-plus"></i> Browse Events
                        </a>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="row">';
            
            registrations.forEach(reg => {
                const event = reg.event || reg;
                const eventDate = new Date(event.eventDate || event.event_date);
                const isUpcoming = eventDate > new Date();
                
                html += `
                    <div class="col-md-6">
                        <div class="event-card">
                            <div class="event-header">
                                <h5 class="mb-2">${event.title}</h5>
                                <small><i class="fas fa-calendar"></i> ${formatDate(event.eventDate || event.event_date)}</small>
                            </div>
                            <div class="event-body">
                                <p class="mb-2">
                                    <strong><i class="fas fa-map-marker-alt"></i> Venue:</strong> ${event.venue}
                                </p>
                                <p class="mb-2">
                                    <strong><i class="fas fa-users"></i> Club:</strong> ${event.clubName || event.club_name}
                                </p>
                                <p class="mb-3">
                                    <strong><i class="fas fa-user-tie"></i> Organizer:</strong> ${event.organizerName || event.organizer_name}
                                </p>
                                
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="status-badge ${isUpcoming ? 'bg-warning' : 'bg-success'} text-white">
                                        ${isUpcoming ? '📅 Upcoming' : '✅ Completed'}
                                    </span>
                                    
                                    <div>
                                        <button class="btn btn-sm btn-info" onclick="viewEventDetails(${event.id})">
                                            <i class="fas fa-eye"></i> View Details
                                        </button>
                                        
                                        ${!isUpcoming ? `
                                            <button class="btn btn-sm btn-primary" onclick="viewMyScores(${event.id})">
                                                <i class="fas fa-star"></i> View Scores
                                            </button>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // ============================================
        // UPDATE STATISTICS
        // ============================================
        function updateStats(registrations) {
            const total = registrations.length;
            let attended = 0;
            let upcoming = 0;
            let credits = 0;
            
            registrations.forEach(reg => {
                const event = reg.event || reg;
                const eventDate = new Date(event.eventDate || event.event_date);
                
                if (eventDate > new Date()) {
                    upcoming++;
                } else {
                    attended++;
                    credits += parseFloat(event.ee_credits || 0);
                }
            });
            
            document.getElementById('totalEvents').textContent = total;
            document.getElementById('attendedEvents').textContent = attended;
            document.getElementById('upcomingEvents').textContent = upcoming;
            document.getElementById('totalCredits').textContent = credits.toFixed(1);
        }
        
        // ============================================
        // VIEW EVENT DETAILS
        // ============================================
        function viewEventDetails(eventId) {
            window.location.href = `../event-brochure.html?eventId=${eventId}`;
        }
        
        // ============================================
        // VIEW MY SCORES
        // ============================================
        function viewMyScores(eventId) {
            window.location.href = `../student-rubrics.html?eventId=${eventId}`;
        }
        
        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userRole');
            window.location.href = '../login.html';
        }
        
        // ============================================
        // CERTIFICATE GENERATION REMOVED
        // ============================================
        // The following functions have been REMOVED:
        // - generateCertificate()
        // - downloadCertificate()
        // - getCertificate()
    </script>
</body>
</html>
